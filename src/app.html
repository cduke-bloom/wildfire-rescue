<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#c2410c" />
		<meta
			name="description"
			content="Southeast Georgia Wildfire Rescue — connecting displaced families with hosts and donors across Brantley, Glynn, Camden, Wayne, and surrounding counties, GA. Free. No money exchanged."
		/>

		<!-- Open Graph (Facebook, LinkedIn, iMessage) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Southeast Georgia Wildfire Rescue" />
		<meta property="og:title" content="Southeast Georgia Wildfire Rescue" />
		<meta
			property="og:description"
			content="A free community board connecting families displaced by wildfire with hosts and donors — no money exchanged. Brantley, Glynn, Camden, and Wayne counties, GA."
		/>
		<meta property="og:url" content="https://segawildfirerescue.org" />
		<meta property="og:image" content="https://segawildfirerescue.org/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta
			property="og:image:alt"
			content="Southeast Georgia Wildfire Rescue — a white house with a red heart on a warm orange background"
		/>

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Southeast Georgia Wildfire Rescue" />
		<meta
			name="twitter:description"
			content="A free community board connecting families displaced by wildfire with hosts and donors — no money exchanged."
		/>
		<meta name="twitter:image" content="https://segawildfirerescue.org/og-image.png" />

		<!-- Icons -->
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
		<link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- PWA / iOS standalone -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Wildfire Rescue" />

		<title>Southeast Georgia Wildfire Rescue</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
