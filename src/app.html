<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#c2410c" />
		<meta
			name="description"
			content="Brantley Wildfire Rescue — connecting displaced families with hosts and donors across Brantley, Glynn, and Camden counties, GA. Free. No money exchanged."
		/>

		<!-- Icons -->
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
		<link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- PWA / iOS standalone -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Wildfire Rescue" />

		<title>Brantley Wildfire Rescue</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
